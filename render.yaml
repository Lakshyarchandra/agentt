# ─── Render.com Deployment Manifest ───────────────────────────────────────────
# Deploy: push to GitHub, connect repo in Render dashboard, then click "Apply"

services:
  # ─── Backend API (Python Web Service) ────────────────────────────────────────
  - type: web
    name: agent-studio-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: >-
      gunicorn app.main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-studio-db
          property: connectionString
      - key: REDIS_URL
        sync: false   # Set manually in Render dashboard (Upstash free Redis URL)
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false   # Run: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://agent-studio-frontend-zdmv.onrender.com","http://localhost:3000","http://localhost:5173","http://localhost:5174"]'

  # ─── Frontend Static Site (Vite/React) ───────────────────────────────────────
  # Note: static sites do NOT support region or plan fields
  - type: web
    name: agent-studio-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://agent-studio-api-zdmv.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: agent-studio-db
    region: oregon
    plan: free
    databaseName: agentdb
    user: agentuser
