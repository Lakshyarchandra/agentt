# ─── Render.com Deployment Manifest ───────────────────────────────────────────
# Deploy: push to GitHub and connect to Render, or use: render blueprint launch

services:
  # ─── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: agent-studio-api
    runtime: python
    runtimeVersion: 3.12
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn app.main:app
      --workers 2
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:$PORT
      --timeout 120
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agent-studio-db
          property: connectionString
      - key: REDIS_URL
        sync: false   # Set manually in Render dashboard (Upstash Redis URL)
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false   # Set manually — use: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: DEBUG
        value: "false"
      - key: CORS_ORIGINS
        sync: false   # Set to your frontend URL, e.g. ["https://agent-studio-ui.onrender.com"]

  # ─── Frontend Static Site ────────────────────────────────────────────────────
  - type: web
    name: agent-studio-ui
    runtime: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to your backend URL, e.g. https://agent-studio-api.onrender.com/api/v1

# ─── PostgreSQL Database ──────────────────────────────────────────────────────
databases:
  - name: agent-studio-db
    region: oregon
    plan: free
    databaseName: agentdb
    user: agentuser
